{% with s=value.styles %}<section class="block-section block-section--{{ value.theme }}{% if s.card %} block--card{% endif %}{% if s.border %} block--border{% endif %}{% if s.custom_classes %} {{ s.custom_classes }}{% endif %}"{% if s.background or s.text_color or s.border_color %} style="{% if s.background %}background:{{ s.background }};{% endif %}{% if s.text_color %}color:{{ s.text_color }};{% endif %}{% if s.border and s.border_color %}border-color:{{ s.border_color }};{% endif %}"{% endif %}>
    <div class="container block-align--{{ value.alignment }}">
        <h2>{{ value.heading }}</h2>
        <div>{{ value.body }}</div>
    </div>
</section>{% endwith %}
