{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block body_class %}page-standard{% endblock %}

{% block content %}
    <h1>{{ page.title }}</h1>

    {% if page.intro %}
        <div class="intro">{{ page.intro|richtext }}</div>
    {% endif %}

    {% for block in page.body %}
        {% include_block block %}
    {% endfor %}
{% endblock %}
